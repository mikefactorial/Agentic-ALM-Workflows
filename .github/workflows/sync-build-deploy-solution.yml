name: Sync, Build, and Deploy Solution

# Callable workflow — sync from dev env, build, then deploy to target environments.
# Required for inner loop: always sync before deploying to dev-test.

on:
  workflow_call:
    inputs:
      source_environment:
        description: 'Source environment slug to sync from (innerLoopEnvironments[*].slug)'
        required: true
        type: string
      solution_name:
        description: 'Solution unique name to sync'
        required: true
        type: string
      target_environments:
        description: 'Comma-separated target environment slugs'
        required: true
        type: string
      publish_customizations:
        description: 'Publish customizations before syncing'
        required: false
        type: boolean
        default: true
      branch_name:
        description: 'Branch name to commit to'
        required: false
        type: string
        default: 'develop'
      commit_message:
        description: 'Git commit message'
        required: false
        type: string
        default: 'chore: automated solution sync'
      continue_on_error:
        description: 'Continue deploying remaining environments if one fails'
        required: false
        type: boolean
        default: false
      use_upgrade:
        description: 'Use single-stage upgrade for existing solutions'
        required: false
        type: boolean
        default: false
      create_pr:
        description: 'Open a pull request instead of committing directly to branch_name'
        required: false
        type: boolean
        default: false
    secrets:
      HOOK_SECRETS:
        required: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  HOOK_VARIABLES: ${{ vars.HOOK_VARIABLES }}
  HOOK_SECRETS: ${{ secrets.HOOK_SECRETS }}

jobs:
  sync:
    name: Sync Solution
    runs-on: windows-latest
    environment: ${{ inputs.source_environment }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout platform scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Agentic-ALM-Workflows
          ref: main
          path: .platform

      - name: Configure Git
        run: |
          git config user.name "alm-automation[bot]"
          git config user.email "alm-automation[bot]@users.noreply.github.com"

      - name: Setup Power Platform CLI
        shell: pwsh
        run: .platform\.github\workflows\scripts\Install-PacCli.ps1

      - name: Resolve sync branch
        id: branch
        shell: pwsh
        run: |
          if ('${{ inputs.create_pr }}' -eq 'true') {
            $syncBranch = "sync/${{ inputs.solution_name }}-${{ github.run_number }}"
          } else {
            $syncBranch = "${{ inputs.branch_name }}"
          }
          "sync_branch=$syncBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Sync Solution
        shell: pwsh
        run: |
          .platform\.github\workflows\scripts\Sync-Solution.ps1 `
            -solutionName "${{ inputs.solution_name }}" `
            -environmentUrl "${{ vars.DATAVERSE_URL }}" `
            -tenantId "${{ vars.AZURE_TENANT_ID }}" `
            -clientId "${{ vars.DATAVERSE_CLIENT_ID }}" `
            -publishCustomizations $${{ inputs.publish_customizations }} `
            -commitMessage "${{ inputs.commit_message }}" `
            -branchName "${{ steps.branch.outputs.sync_branch }}"

      - name: Create Pull Request
        if: inputs.create_pr == true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $pr = gh pr create `
            --base "${{ inputs.branch_name }}" `
            --head "${{ steps.branch.outputs.sync_branch }}" `
            --title "chore(sync): sync ${{ inputs.solution_name }} from ${{ inputs.source_environment }}" `
            --body "Automated solution sync from environment ``${{ inputs.source_environment }}``.`n`nRun: #${{ github.run_number }}"
          Write-Host "Pull request created: $pr"

      - name: Upload synced solution
        uses: actions/upload-artifact@v4
        with:
          name: synced-solution-${{ github.run_number }}
          path: src/solutions/${{ inputs.solution_name }}/
          if-no-files-found: error

  build:
    name: Build Solution
    runs-on: windows-latest
    needs: sync
    outputs:
      solutions: ${{ inputs.solution_name }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout platform scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Agentic-ALM-Workflows
          ref: main
          path: .platform

      - name: Download synced solution
        uses: actions/download-artifact@v4
        with:
          name: synced-solution-${{ github.run_number }}
          path: src/solutions/${{ inputs.solution_name }}/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Power Platform CLI
        shell: pwsh
        run: .platform\.github\workflows\scripts\Install-PacCli.ps1

      - name: Build solution
        shell: pwsh
        run: |
          .platform\.github\workflows\scripts\Build-Solutions.ps1 `
            -solutionList "${{ inputs.solution_name }}" `
            -targetEnvironmentList "${{ inputs.target_environments }}" `
            -artifactsPath "./artifacts/solutions"

      - name: Upload solution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: |
            ./artifacts/solutions/*.zip
            ./artifacts/solutions/*_settings.json
          if-no-files-found: error

  prepare-deployment:
    name: Prepare Deployment
    runs-on: windows-latest
    needs: build
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Build deployment matrix
        id: matrix
        shell: pwsh
        run: |
          $environments = "${{ inputs.target_environments }}" -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" } | Sort-Object
          $solution = "${{ inputs.solution_name }}"

          if ($environments.Count -eq 0) { Write-Error "No environments specified"; exit 1 }

          $matrixInclude = @()
          foreach ($env in $environments) {
            $matrixInclude += @{ environment = $env; solution = $solution }
          }

          $matrix = @{ include = $matrixInclude }
          $matrixJson = $matrix | ConvertTo-Json -Compress -Depth 10
          Write-Host "Deployment matrix: $matrixJson"
          "matrix=$matrixJson" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: windows-latest
    needs: [build, prepare-deployment]
    environment: ${{ matrix.environment }}
    concurrency:
      group: deploy-${{ inputs.solution_name }}-${{ matrix.environment }}
      cancel-in-progress: false
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-deployment.outputs.matrix) }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4

      - name: Checkout platform scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Agentic-ALM-Workflows
          ref: main
          path: .platform

      - name: Setup Power Platform CLI
        shell: pwsh
        run: .platform\.github\workflows\scripts\Install-PacCli.ps1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.run_number }}
          path: ./artifacts/solutions

      - name: Deploy solution
        shell: pwsh
        env:
          HOOK_SUMMARY_PATH: ./deployment-summaries/hooks-${{ matrix.solution }}-${{ matrix.environment }}.json
        run: |
          .platform\.github\workflows\scripts\Deploy-Solutions.ps1 `
            -solutionList "${{ matrix.solution }}" `
            -targetEnvironment "${{ matrix.environment }}" `
            -environmentUrl "${{ vars.DATAVERSE_URL }}" `
            -artifactsPath "./artifacts/solutions" `
            -tenantId "${{ vars.AZURE_TENANT_ID }}" `
            -clientId "${{ vars.DATAVERSE_CLIENT_ID }}" `
            -continueOnError $${{ inputs.continue_on_error }} `
            -useUpgrade $${{ inputs.use_upgrade }}

      - name: Upload hook summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hook-summary-${{ matrix.solution }}-${{ matrix.environment }}
          path: ./deployment-summaries/hooks-${{ matrix.solution }}-${{ matrix.environment }}.json
          if-no-files-found: warn

  workflow-summary:
    name: Workflow Summary
    runs-on: windows-latest
    needs: [sync, build, prepare-deployment, deploy]
    if: always()

    steps:
      - name: Download hook summaries
        if: always()
        uses: actions/download-artifact@v4
        with:
          pattern: hook-summary-*
          path: ./hook-summaries
          merge-multiple: true

      - name: Generate summary
        shell: pwsh
        run: |
          "## Sync, Build & Deploy Complete! :rocket:" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "### Workflow Information" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "- Run: #${{ github.run_number }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "- Solution: ${{ inputs.solution_name }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "- Source: ${{ inputs.source_environment }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "- Targets: ${{ inputs.target_environments }}" | Add-Content -Path $env:GITHUB_STEP_SUMMARY
          "- Committed: Yes (branch: ${{ inputs.branch_name }})" | Add-Content -Path $env:GITHUB_STEP_SUMMARY

name: Sync Solution

# Callable workflow — export + unpack a Dataverse solution to the repository.
# Triggered by thin callers in solution repos via workflow_call.

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment slug to sync from (innerLoopEnvironments[*].slug)'
        required: true
        type: string
      solution_name:
        description: 'Solution unique name to sync'
        required: true
        type: string
      commit_message:
        description: 'Git commit message'
        required: false
        type: string
        default: 'chore: automated solution sync'
      branch_name:
        description: 'Branch name to commit to'
        required: false
        type: string
        default: 'develop'
      publish_customizations:
        description: 'Publish customizations before syncing'
        required: false
        type: boolean
        default: true
      create_pr:
        description: 'Open a pull request instead of committing directly to branch_name'
        required: false
        type: boolean
        default: false
    secrets:
      HOOK_SECRETS:
        required: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

env:
  HOOK_VARIABLES: ${{ vars.HOOK_VARIABLES }}
  HOOK_SECRETS: ${{ secrets.HOOK_SECRETS }}

jobs:
  sync-solution:
    name: Sync Solution to Repository
    runs-on: windows-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout platform scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Agentic-ALM-Workflows
          ref: main
          path: .platform

      - name: Configure Git
        run: |
          git config user.name "alm-automation[bot]"
          git config user.email "alm-automation[bot]@users.noreply.github.com"

      - name: Resolve sync branch
        id: branch
        shell: pwsh
        run: |
          if ('${{ inputs.create_pr }}' -eq 'true') {
            $syncBranch = "sync/${{ inputs.solution_name }}-${{ github.run_number }}"
          } else {
            $syncBranch = "${{ inputs.branch_name }}"
          }
          "sync_branch=$syncBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Sync Solution
        shell: pwsh
        run: |
          $syncParams = @{
            solutionName          = "${{ inputs.solution_name }}"
            environmentUrl        = "${{ vars.DATAVERSE_URL }}"
            tenantId              = "${{ vars.AZURE_TENANT_ID }}"
            clientId              = "${{ vars.DATAVERSE_CLIENT_ID }}"
            publishCustomizations = $${{ inputs.publish_customizations }}
            commitMessage         = "${{ inputs.commit_message }}"
            branchName            = "${{ steps.branch.outputs.sync_branch }}"
          }
          .platform\.github\workflows\scripts\Sync-Solution.ps1 @syncParams

      - name: Create Pull Request
        if: inputs.create_pr == true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $pr = gh pr create `
            --base "${{ inputs.branch_name }}" `
            --head "${{ steps.branch.outputs.sync_branch }}" `
            --title "chore(sync): sync ${{ inputs.solution_name }} from ${{ inputs.environment }}" `
            --body "Automated solution sync from environment ``${{ inputs.environment }}``.`n`nRun: #${{ github.run_number }}"
          Write-Host "Pull request created: $pr"

      - name: Sync Summary
        if: success()
        run: |
          echo "=========================================="
          echo "✓ Solution Sync: SUCCESS"
          echo "=========================================="
          echo "  ✓ Synced '${{ inputs.solution_name }}' from ${{ inputs.environment }}"
          echo "  ✓ Committed to branch '${{ steps.branch.outputs.sync_branch }}'"
